name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      case_file:
        description: "Case YAML under e2e-tests/cases/ (e.g. pr-tests.yaml)"
        type: string
        default: pr-tests.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.case_file }}
  cancel-in-progress: true

env:
  TASK_VERSION: 3.48.0

jobs:
  detect-changes:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.matrix.outputs.agents }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            langgraph:
              - 'src/datarobot_genai/langgraph/**'
            llamaindex:
              - 'src/datarobot_genai/llama_index/**'
            crewai:
              - 'src/datarobot_genai/crewai/**'
            nat:
              - 'src/datarobot_genai/nat/**'
            base:
              - 'e2e-tests/dragent/base/**'
            core:
              - 'src/datarobot_genai/dragent/**'
              - 'src/datarobot_genai/core/**'
              - 'e2e-tests/**'
              - '.github/workflows/e2e.yml'

      - id: matrix
        run: |
          agents='[]'
          core="${{ steps.filter.outputs.core }}"
          declare -A changed=(
            [langgraph]="${{ steps.filter.outputs.langgraph }}"
            [llamaindex]="${{ steps.filter.outputs.llamaindex }}"
            [nat]="${{ steps.filter.outputs.nat }}"
            [base]="${{ steps.filter.outputs.base }}"
            [crewai]="${{ steps.filter.outputs.crewai }}"
          )
          for fw in langgraph llamaindex nat base crewai; do
            if [[ "${changed[$fw]}" == "true" || "$core" == "true" ]]; then
              agents=$(echo "$agents" | jq -c ". + [\"$fw\"]")
            fi
          done
          echo "agents=$agents" >> "$GITHUB_OUTPUT"

  prepare-matrix:
    needs: [detect-changes]
    # detect-changes is skipped on workflow_dispatch — gate accordingly.
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (needs.detect-changes.result == 'success' &&
         needs.detect-changes.outputs.agents != '[]')
      )
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_combos: ${{ steps.gen.outputs.has_combos }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - id: gen
        working-directory: e2e-tests
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual run: pick the requested case file, no agent filter.
            matrix=$(uv run --script scripts/cases.py generate-matrix \
              "${{ inputs.case_file }}")
          else
            # PR / push: filter the matrix to agents whose code changed.
            agents_csv=$(echo '${{ needs.detect-changes.outputs.agents }}' | jq -r 'join(",")')
            matrix=$(uv run --script scripts/cases.py generate-matrix \
              pr-tests.yaml \
              --agents "$agents_csv")
          fi
          # Empty `include:` would make the downstream job blow up
          # ("Matrix vector 'include' does not contain any values"); emit a
          # boolean so the e2e job can gate on it.
          count=$(echo "$matrix" | jq '.include | length')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_combos=$([[ "$count" -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Generated $count combination(s)."

  e2e:
    needs: [prepare-matrix]
    # `always()` is required because a skipped ancestor (detect-changes is
    # skipped on workflow_dispatch) otherwise poisons the implicit `success()`
    # check and skips this job even when prepare-matrix succeeded. Gate on the
    # explicit result + has_combos instead.
    if: |
      always() &&
      needs.prepare-matrix.result == 'success' &&
      needs.prepare-matrix.outputs.has_combos == 'true'
    # `matrix.name` is the per-combo label produced by cases.py — format is
    # "<case>--<matrix-value-1>--<matrix-value-2>...". Without an explicit
    # name GH would label each parallel job with every field in the matrix
    # entry (case, agent, python_version, tests, pytest_args, env, ...) which
    # is unreadable.
    name: e2e / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    permissions:
      contents: read
    env:
      # Single shared secrets layer — same for every matrix entry. Case-specific
      # values (LLM, LLM_DEFAULT_MODEL, WORKFLOW_FILE, ...) are applied below
      # from `matrix.env`.
      DATAROBOT_API_TOKEN: ${{ secrets.E2E_DATAROBOT_API_TOKEN }}
      DATAROBOT_ENDPOINT: ${{ secrets.E2E_DATAROBOT_ENDPOINT }}
      DATAROBOT_USER_ID: ${{ secrets.E2E_DATAROBOT_USER_ID }}
      MCP_DEPLOYMENT_ID: ${{ secrets.E2E_MCP_DEPLOYMENT_ID }}
      SESSION_SECRET_KEY: ${{ secrets.E2E_SESSION_SECRET_KEY }}
      LLM_DEPLOYMENT_ID: ${{ secrets.E2E_LLM_DEPLOYMENT_ID }}
      NIM_DEPLOYMENT_ID: ${{ secrets.E2E_NIM_DEPLOYMENT_ID }}
      AZURE_API_KEY: ${{ secrets.E2E_AZURE_API_KEY }}
      AZURE_API_BASE: ${{ secrets.E2E_AZURE_API_BASE }}
      AZURE_API_VERSION: "2025-03-01-preview"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv and virtualenv
        uses: actions/cache@v4
        with:
          path: |
            e2e-tests/.venv
            ~/.cache/uv
          key: e2e-uv-${{ runner.os }}-${{ matrix.python_version }}-${{ matrix.agent }}-${{ hashFiles('e2e-tests/uv.lock') }}
          restore-keys: |
            e2e-uv-${{ runner.os }}-${{ matrix.python_version }}-${{ matrix.agent }}-

      - name: Apply case env
        run: |
          echo '${{ toJson(matrix.env) }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: e2e-tests
        run: uv sync --group dragent-${{ matrix.agent }}

      - name: Materialize workflow override
        working-directory: e2e-tests
        run: |
          f="${WORKFLOW_FILE:-workflow.yaml}"
          src="dragent/overrides/$f"
          dst="dragent/${{ matrix.agent }}/$f"
          if [ -f "$src" ] && [ ! -f "$dst" ]; then
            cp "$src" "$dst"
          fi

      - name: Run dragent server in background
        uses: JarvusInnovations/background-action@v1
        with:
          working-directory: e2e-tests
          run: task dragent:run-${{ matrix.agent }} &
          wait-on: http-get://localhost:8080/health
          wait-for: 60s

      - name: Run e2e tests
        working-directory: e2e-tests
        run: |
          uv run pytest ${{ matrix.tests }} ${{ matrix.pytest_args }} --junitxml=test_results/results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.name }}-py${{ matrix.python_version }}
          path: e2e-tests/test_results/
          if-no-files-found: ignore
