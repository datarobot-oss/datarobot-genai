name: Smoke Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/datarobot_genai/langgraph/**"
      - "src/datarobot_genai/crewai/**"
      - "src/datarobot_genai/llama_index/**"
      - "src/datarobot_genai/core/**"
      - ".github/workflows/smoke.yml"
  pull_request:
    paths:
      - "src/datarobot_genai/langgraph/**"
      - "src/datarobot_genai/crewai/**"
      - "src/datarobot_genai/llama_index/**"
      - "src/datarobot_genai/core/**"
      - ".github/workflows/smoke.yml"

env:
  TASK_VERSION: 3.48.0

jobs:
  smoke:
    name: "Smoke / ${{ matrix.framework }} / ${{ matrix.model.label }}"
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        framework: [langgraph, crewai, llamaindex]
        model:
          - label: gpt
            id: "datarobot/azure/gpt-5-1-2025-11-13"
          - label: sonnet
            id: "datarobot/anthropic/claude-sonnet-4-5-20250929"
          - label: gemini
            id: "datarobot/vertex_ai/gemini-3.1-pro-preview"
    permissions:
      contents: read
    env:
      DATAROBOT_API_TOKEN: ${{ secrets.E2E_DATAROBOT_API_TOKEN }}
      DATAROBOT_ENDPOINT: ${{ secrets.E2E_DATAROBOT_ENDPOINT }}
      LLM: llmgw
      LLM_DEFAULT_MODEL: ${{ matrix.model.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv and virtualenv
        uses: actions/cache@v4
        with:
          path: |
            e2e-tests/.venv
            ~/.cache/uv
          key: smoke-uv-${{ runner.os }}-${{ matrix.framework }}-${{ matrix.model.label }}-${{ hashFiles('e2e-tests/uv.lock') }}
          restore-keys: |
            smoke-uv-${{ runner.os }}-${{ matrix.framework }}-${{ matrix.model.label }}-
            smoke-uv-${{ runner.os }}-${{ matrix.framework }}-

      - name: Install dependencies
        working-directory: e2e-tests
        run: uv sync --group dragent-${{ matrix.framework }}

      - name: Run smoke test
        working-directory: e2e-tests
        run: |
          uv run pytest smoke_tests/test_smoke_${{ matrix.framework }}.py \
            -vv -s --timeout=60 --reruns=2 --reruns-delay=5 \
            --junitxml=test_results/smoke-${{ matrix.framework }}-${{ matrix.model.label }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.framework }}-${{ matrix.model.label }}
          path: e2e-tests/test_results/
          if-no-files-found: ignore
