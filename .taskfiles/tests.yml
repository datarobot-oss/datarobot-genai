version: '3'

tasks:
  test:
    desc: "Run repo unit tests via pytest"
    cmds:
      - mkdir -p test_results
      - |
          set -e
          COV_FAIL_UNDER=80
          uv run pytest --junitxml=test_results/test-results.xml \
            --cov=datarobot_genai --cov-branch --cov-fail-under=${COV_FAIL_UNDER} --no-cov-on-fail \
            -vv -s tests \
            --ignore=tests/drmcp/integration --ignore=tests/drmcp/acceptance --ignore=tests/nat/integration --ignore=tests/drtools/integration
    silent: true

  test-module:
    desc: "Run repo unit tests via pytest for a specific module"
    requires:
      vars:
        - name: MODULE
          enum:
            - core
            - crewai
            - langgraph
            - llamaindex
            - drmcpbase
            - drmcp
            - nat
            - dragent
            - eval
    cmds:
      - mkdir -p test_results
      - |
          echo "pytest path: tests/{{.MODULE}}"
          {{if eq .MODULE "nat"}}uv sync --extra nat --extra crewai --extra llamaindex --extra dragent{{end}}
          {{if or (eq .MODULE "drmcpbase") (eq .MODULE "eval")}}
          # drmcpbase and eval are intentionally minimal standalone extras,
          # so avoid loading root conftest rather than pulling in the full SDK just to run a package smoke test for now
          uv run pytest tests/{{.MODULE}} \
            --confcutdir=tests/{{.MODULE}} \
            --junitxml=test_results/test-results.xml -vv -s
          {{else}}
          uv run pytest tests/{{.MODULE}} \
            --junitxml=test_results/test-results.xml -vv -s \
            --ignore=tests/drmcp/integration --ignore=tests/drmcp/acceptance --ignore=tests/nat/integration --ignore=tests/drtools/integration
          {{end}}
    silent: true

  test-nat-integration:
    desc: "Run NAT integration tests"
    cmds:
      - mkdir -p test_results
      - |
          set -e
          COV_FAIL_UNDER=80
          uv run pytest --junitxml=test_results/test-results.xml \
            --cov=datarobot_genai --cov-branch --cov-fail-under=${COV_FAIL_UNDER} --no-cov-on-fail \
            -vv -s tests/nat/integration
    silent: true
