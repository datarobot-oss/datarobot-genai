---
# https://taskfile.dev
version: '3'

vars:
  PROJECT_SRC: "./dragent ./drmcp"
  TESTS_SRC: ""

includes:
  dragent:
    taskfile: dragent/Taskfile.yaml
    dir: ./dragent
  lint:
    taskfile: ../.taskfiles/lint.yml
    flatten: true

env:
  LLM: '{{.LLM | default "llmgw"}}'
  ENV: '{{.ENV | default "testing"}}'
  AGENT: '{{.AGENT}}'

dotenv:
  - '.env.{{.ENV}}'
  - '.env.{{.LLM}}'
  - '.env'

tasks:
  default:
    cmds:
      - task --list
  install:
    desc: "🔧 Install dependencies for a specific group of functionality"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
          - router
    cmds:
      - echo "🔧 Installing dependencies for {{.AGENT}}"
      - uv sync --group dragent-{{.AGENT}} --group lint
  install-all:
    desc: "🔧 Install dependencies for all groups"
    cmds:
      - echo "🔧 Installing dependencies for all groups"
      - uv sync --all-groups
  test-dragent:
    desc: "🧪 Run tests for dragent"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
          - router
    cmds:
      - echo "🧪 Running tests for dragent"
      - uv run pytest dragent_tests -vv -s
  test-drmcp:
    desc: "🧪 Run tests for drmcp"
    cmds:
      - echo "🧪 Running tests for drmcp"
      - uv run pytest drmcp_tests -vv -s
  test-target:
    desc: "🧪 Run tests for a specific target"
    cmds:
      - echo "🧪 Running tests for {{.TARGET}}"
      - uv run pytest {{.CLI_ARGS}} -vv -s

  run-dragent:
    desc: "🔨 Run dragent"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
          - router
    cmds:
      - echo "🔨 Running dragent"
      - task: install
      - task dragent:run-{{.AGENT}}
