---
# https://taskfile.dev
version: '3'

vars:
  PROJECT_SRC: "./dragent ./drmcp"
  TESTS_SRC: ""

includes:
  dragent:
    taskfile: dragent/Taskfile.yaml
    dir: ./dragent
  lint:
    taskfile: ../.taskfiles/lint.yml
    flatten: true

env:
  LLM: '{{.LLM | default "llmgw"}}'
  ENV: '{{.ENV | default "testing"}}'
  AGENT: '{{.AGENT}}'

dotenv:
  - '.env.{{.ENV}}'
  - '.env.{{.LLM}}'
  - '.env'

tasks:
  default:
    cmds:
      - task --list
  install:
    desc: "🔧 Install dependencies for a specific group of functionality"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
    cmds:
      - echo "🔧 Installing dependencies for {{.AGENT}}"
      - uv sync --group dragent-{{.AGENT}} --dev
  install-all:
    desc: "🔧 Install dependencies for all groups"
    cmds:
      - echo "🔧 Installing dependencies for all groups"
      - uv sync --all-groups
  test-dragent:
    desc: "🧪 Run tests for dragent"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
    cmds:
      - echo "🧪 Running tests for dragent"
      - uv run pytest dragent_tests -vv -s
  test-drmcp:
    desc: "🧪 Run tests for drmcp"
    cmds:
      - echo "🧪 Running tests for drmcp"
      - uv run pytest drmcp_tests -vv -s
  test-target:
    desc: "🧪 Run tests for a specific target"
    cmds:
      - echo "🧪 Running tests for {{.TARGET}}"
      - uv run pytest {{.CLI_ARGS}} -vv -s
  test-examples:
    desc: "🧪 Run examples"
    cmds:
      - echo "🧪 Running examples"
      - uv run pytest --nbmake "examples" -vv -s

  smoke:
    desc: "🔥 Run smoke tests for a specific framework against LLM_DEFAULT_MODEL"
    requires:
      vars:
      - name: FRAMEWORK
        enum:
          - langgraph
          - crewai
          - llamaindex
    cmds:
      - echo "🔥 Running smoke test for {{.FRAMEWORK}} with model $LLM_DEFAULT_MODEL"
      - uv sync --group dragent-{{.FRAMEWORK}}
      - uv run pytest smoke_tests/test_smoke_{{.FRAMEWORK}}.py -vv -s --timeout=60

  smoke-all:
    desc: "🔥 Run all smoke tests (all framework × model combinations from smoke_matrix.yaml)"
    cmds:
      - uv sync --group dragent-langgraph --group dragent-crewai --group dragent-llamaindex
      - |
        uv run python - << 'EOF'
        import os, subprocess, sys, yaml

        with open("smoke_matrix.yaml") as f:
            matrix = yaml.safe_load(f)

        failed = []
        for fw in matrix["framework"]:
            for model in matrix["model"]:
                label, model_id = model["label"], model["id"]
                print(f"\n🔥  {fw} / {label}  ({model_id})")
                env = {**os.environ, "LLM_DEFAULT_MODEL": model_id, "LLM": "llmgw"}
                result = subprocess.run(
                    ["uv", "run", "pytest", f"smoke_tests/test_smoke_{fw}.py",
                     "-v", "-s", "--timeout=60", "--tb=short"],
                    env=env,
                )
                if result.returncode != 0:
                    failed.append(f"{fw}/{label}")

        print()
        if failed:
            print(f"❌  Failed: {', '.join(failed)}")
            sys.exit(1)
        print("✅  All smoke tests passed!")
        EOF

  run-dragent:
    desc: "🔨 Run dragent"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
    cmds:
      - echo "🔨 Running dragent"
      - task: install
      - task dragent:run-{{.AGENT}}
