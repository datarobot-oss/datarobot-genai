---
# https://taskfile.dev
version: '3'

vars:
  PROJECT_SRC: "./dragent ./drmcp"
  TESTS_SRC: ""

includes:
  dragent:
    taskfile: dragent/Taskfile.yaml
    dir: ./dragent
  lint:
    taskfile: ../.taskfiles/lint.yml
    flatten: true

env:
  LLM: '{{.LLM | default "llmgw"}}'
  ENV: '{{.ENV | default "testing"}}'
  AGENT: '{{.AGENT}}'

# LLM-specific values come from cases/*.yaml at runtime. The single .env file
# carries credentials shared across every case (DATAROBOT_*, AZURE_*, etc.).
dotenv:
  - '.env.{{.ENV}}'
  - '.env.{{.LLM}}'
  - '.env'

tasks:
  default:
    cmds:
      - task --list
  install:
    desc: "🔧 Install dependencies for a specific group of functionality"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
    cmds:
      - echo "🔧 Installing dependencies for {{.AGENT}}"
      - uv sync --group dragent-{{.AGENT}} --dev
  install-all:
    desc: "🔧 Install dependencies for all groups"
    cmds:
      - echo "🔧 Installing dependencies for all groups"
      - uv sync --all-groups
  test-dragent:
    desc: "🧪 Run tests for dragent"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
    cmds:
      - echo "🧪 Running tests for dragent"
      - uv run pytest dragent_tests -vv -s
  test-drmcp:
    desc: "🧪 Run tests for drmcp"
    cmds:
      - echo "🧪 Running tests for drmcp"
      - uv run pytest drmcp_tests -vv -s
  test-target:
    desc: "🧪 Run tests for a specific target"
    cmds:
      - echo "🧪 Running tests for {{.TARGET}}"
      - uv run pytest {{.CLI_ARGS}} -vv -s
  test-examples:
    desc: "🧪 Run examples"
    cmds:
      - echo "🧪 Running examples"
      - uv run pytest --nbmake "examples" -vv -s

  run-dragent:
    desc: "🔨 Run dragent"
    requires:
      vars:
      - name: AGENT
        enum:
          - nat
          - crewai
          - langgraph
          - llamaindex
          - base
    cmds:
      - echo "🔨 Running dragent"
      - task: install
      - task dragent:run-{{.AGENT}}

  cases:
    desc: "📋 List combinations: task cases -- pr-tests.yaml [--case X] [--agents nat,langgraph]"
    cmds:
      - uv run --script scripts/cases.py list {{.CLI_ARGS}}

  cases-matrix:
    desc: "🎯 Print GitHub Actions matrix JSON: task cases-matrix -- pr-tests.yaml [--case X] [--agents ...]"
    cmds:
      - uv run --script scripts/cases.py generate-matrix {{.CLI_ARGS}}

  cases-run:
    desc: "🏃 Run case combinations locally: task cases-run -- pr-tests.yaml [--case X] [KEY=VAL ...]"
    cmds:
      - uv run python scripts/run_local.py {{.CLI_ARGS}}

  cases-print:
    desc: "🔍 Dry-run: task cases-print -- pr-tests.yaml [--case X] [KEY=VAL ...]"
    cmds:
      - uv run python scripts/run_local.py --print {{.CLI_ARGS}}

  cases-ci:
    desc: "☁️  Run a case as a GitHub Action on the current branch: task cases-ci -- pr-tests.yaml"
    vars:
      BRANCH:
        sh: git rev-parse --abbrev-ref HEAD
    cmds:
      - gh workflow run e2e.yml --ref {{.BRANCH}} -f case_file={{.CLI_ARGS}}
