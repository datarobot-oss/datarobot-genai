cases:
  - name: llm-gateway-sonnet
    env:
      LLM: llmgw
      WORKFLOW_FILE: workflow-reasoning-sonnet.yaml
    tests:
      - ./dragent_tests  # all tests indiscriminately
    matrix:
      LLM_DEFAULT_MODEL:
      - datarobot/anthropic/claude-sonnet-4-6
      - datarobot/bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0
      AGENT:
        - nat
        - crewai
        - langgraph
        - llamaindex

