cases:
  - name: dr-memory-service
    env:
      LLM: llmgw
      LLM_DEFAULT_MODEL: "datarobot/bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0"
      WORKFLOW_FILE: workflow-memory.yaml
      E2E_PROVISION_MEMORY_SPACE: "true"
    tests:
      - ./dragent_tests/test_memory.py
    pytest_args:
      - "-vv"
      - "-s"
      - "--timeout=180"
      - "--tb=short"
      - "--reruns=1"
      - "--reruns-delay=5"
    matrix:
      AGENT:
        - nat
        - crewai
        - langgraph
        - llamaindex
