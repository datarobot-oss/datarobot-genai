cases:
  - name: ootb
    env:
      LLM: llmgw
      LLM_DEFAULT_MODEL: "datarobot/bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0"
      WORKFLOW_FILE: workflow-ootb-moderations.yaml
    tests:
      - ./dragent_tests  # all tests indiscriminately
    matrix:
      AGENT:  # all agents
        - nat
        - crewai
        - langgraph
        - llamaindex
        - base

  # NOTE: custom metric tests are expected RED until drauth is added to custom metric endpoint call in moderations
  - name: ootb-custom
    env:
      LLM: llmgw
      LLM_DEFAULT_MODEL: "datarobot/azure/gpt-5-2-2025-12-11"
      WORKFLOW_FILE: workflow-ootb-custom-moderations.yaml
    tests:
      - ./dragent_tests  # all tests indiscriminately
    matrix:
      AGENT:  # all agents
        - nat
        - crewai
        - langgraph
        - llamaindex
        - base

  - name: custom-model
    env:
      LLM: llmgw
      LLM_DEFAULT_MODEL: "datarobot/anthropic/claude-sonnet-4-6"
      WORKFLOW_FILE: workflow-custom-model-moderations.yaml
    tests:
      - ./dragent_tests  # all tests indiscriminately
    matrix:
      AGENT:  # all agents
        - nat
        - crewai
        - langgraph
        - llamaindex
        - base

  # NOTE: the streaming / multi-turn agents (crewai, langgraph, llamaindex, nat) are
  # expected RED here until datarobot-moderations >= 11.2.35 is published. With the
  # model-id prefix fixed the guard now reaches the gateway, but datarobot_dome runs
  # each guard call on a fresh asyncio event loop while reusing one shared NeMo client,
  # so it raises "Event is bound to a different event loop" and the guard fails open.
  # Fixed in moderations PR #648 (pending release); tracked in BUZZOK-31306. This case
  # is workflow_dispatch-only, so a red run does not gate PRs.
  - name: nemo-guardrails
    env:
      LLM: llmgw
      LLM_DEFAULT_MODEL: "datarobot/vertex_ai/gemini-3.1-pro-preview"
      WORKFLOW_FILE: workflow-nemo-guardrails-moderations.yaml
    tests:
      - ./dragent_tests  # all tests indiscriminately
    matrix:
      AGENT:  # all agents
        - nat
        - crewai
        - langgraph
        - llamaindex
        - base

