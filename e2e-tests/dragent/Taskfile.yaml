---
# https://taskfile.dev
version: '3'

env:
  WORKFLOW_FILE: '{{.WORKFLOW_FILE | default "workflow.yaml"}}'
  # Use LiteLLM's bundled model-cost map instead of fetching it from GitHub at
  # runtime. The fetch is lazy and occasionally fires mid-request, exporting a
  # GET span that roots its own trace and flakes the single-trace assertion in
  # the tracing tests. Pinning to the local map removes the network call (and
  # the external GitHub dependency) entirely. See otel_helpers.SETUP_HTTP_SPAN_URLS.
  LITELLM_LOCAL_MODEL_COST_MAP: 'True'

vars:
  AGENT_PORT: 8080

tasks:
  wait:
    desc: "🔨 Waiting for agent to start"
    cmds:
      - echo "🔨 Waiting for agent to start"
      - until curl -f http://localhost:{{.AGENT_PORT}}/health; do sleep 3; done
      - echo "🔨 Agent started"
  run-nat:
    desc: "🔨 Running NAT agent"
    dir: ./nat
    cmds:
      - echo "🔨 Running NAT agent"
      - uv run nat dragent serve --config_file {{.WORKFLOW_FILE}} --port {{.AGENT_PORT}}
  run-crewai:
    desc: "🔨 Running CrewAI agent via NAT"
    dir: ./crewai
    cmds:
      - echo "🔨 Running CrewAI agent via NAT"
      - uv run nat dragent serve --config_file {{.WORKFLOW_FILE}} --port {{.AGENT_PORT}}
  run-langgraph:
    desc: "🔨 Running LangGraph agent via NAT"
    dir: ./langgraph
    cmds:
      - echo "🔨 Running LangGraph agent via NAT"
      - uv run nat dragent serve --config_file {{.WORKFLOW_FILE}} --port {{.AGENT_PORT}}
  run-llamaindex:
    desc: "🔨 Running LlamaIndex agent via NAT"
    dir: ./llamaindex
    cmds:
      - echo "🔨 Running LlamaIndex agent via NAT"
      - uv run nat dragent serve --config_file {{.WORKFLOW_FILE}} --port {{.AGENT_PORT}}
  run-base:
    desc: "🔨 Running base agent via NAT"
    dir: ./base
    cmds:
      - echo "🔨 Running base agent via NAT"
      - uv run nat dragent serve --config_file {{.WORKFLOW_FILE}} --port {{.AGENT_PORT}}
