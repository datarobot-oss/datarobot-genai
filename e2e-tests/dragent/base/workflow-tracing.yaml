#
# Minimal variant of base/workflow.yaml that enables the datarobot_otelcollector
# NAT telemetry exporter. Used by ``test_otel_tracing.py``.
#
# Stripped from the production workflow:
#   - datarobot_moderation middleware: probes DATAROBOT_ENDPOINT/account/info/
#     at builder time, which we redirect to a mock collector that should not
#     have to impersonate the full DR API surface.
#   - datarobot-llm-component LLM: replaced with a stub ``openai`` provider so
#     the build path doesn't probe DR. ``base_agent`` (e2e-tests/dragent/base)
#     returns a static response and never actually invokes the LLM, so the stub
#     is sufficient for exercising the workflow lifecycle that emits NAT
#     ``<workflow>`` spans.
general:
  front_end:
    _type: dragent_fastapi
    step_adaptor:
      mode: "off"
  telemetry:
    tracing:
      otelcollector:
        _type: datarobot_otelcollector
        project: "base"

llms:
  stub_llm:
    _type: openai
    api_key: "stub-not-used"
    model_name: "gpt-4o-mini"

workflow:
  _type: base_agent
  llm_name: stub_llm
  description: Base agent example (tracing variant)
