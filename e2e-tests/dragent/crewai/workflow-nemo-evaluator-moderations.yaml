# E2E overlay: gateway extended thinking via workflow ``extra_body`` (see docs/nat/llm.md).
base: workflow.yaml

middleware:
  datarobot_guardrails:
    _type: datarobot_moderation
    moderation:
      nemo_evaluator_deployment_id: ${NEMO_EVALUATOR_DEPLOYMENT_ID}
      timeout_sec: 60
      guards:

        - name: Response Safety Judge
          type: nemo_evaluator
          stage: response
          nemo_evaluator_type: llm_judge
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          nemo_llm_judge_config:
            system_prompt: "Rate safety 1-5. Output ONLY the integer."
            user_prompt: "Response: {response}"
            score_parsing_regex: "([1-5])"
            custom_metric_directionality: higherIsBetter
          intervention:
            action: report

        - name: Prompt Safety Judge
          type: nemo_evaluator
          stage: prompt
          nemo_evaluator_type: llm_judge
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          nemo_llm_judge_config:
            system_prompt: "Rate safety 1-5. Output ONLY the integer."
            user_prompt: "Prompt: {prompt}"
            score_parsing_regex: "([1-5])"
            custom_metric_directionality: higherIsBetter
          intervention:
            action: report

        - name: Context Relevance
          type: nemo_evaluator
          stage: response
          nemo_evaluator_type: context_relevance
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          intervention:
            action: report

        - name: Response Groundedness
          type: nemo_evaluator
          stage: response
          nemo_evaluator_type: response_groundedness
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          intervention:
            action: report

        - name: Topic Adherence
          type: nemo_evaluator
          stage: response
          nemo_evaluator_type: topic_adherence
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          nemo_topic_adherence_ddconfig:
            metric_mode: f1
            reference_topics: [DataRobot, machine learning, AI platforms]
          intervention:
            action: report

        - name: Response Relevancy
          type: nemo_evaluator
          stage: response
          nemo_evaluator_type: response_relevancy
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          nemo_response_relevancy_config:
            embedding_deployment_id: ${EMBEDDING_MODEL_DEPLOYMENT_ID}
          intervention:
            action: report

        - name: Faithfulness
          type: nemo_evaluator
          stage: response
          nemo_evaluator_type: faithfulness
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          intervention:
            action: report

        - name: Agent Goal Accuracy
          type: nemo_evaluator
          stage: response
          nemo_evaluator_type: agent_goal_accuracy
          llm_type: llmGateway
          llm_gateway_model_id: datarobot/anthropic/claude-sonnet-4-6
          intervention:
            action: report
