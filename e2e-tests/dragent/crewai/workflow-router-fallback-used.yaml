moderation:
  guards:
    - additional_guard_config: null
      aws_model: null
      aws_region: null
      description: Track the number of tokens associated with the input to the LLM, and/or
        retrieved text from the vector database.
      google_model: null
      google_region: null
      is_agentic: false
      name: Prompt Tokens
      ootb_type: token_count
      openai_api_base: null
      openai_api_key: null
      openai_deployment_id: null
      stage: prompt
      type: ootb
    - additional_guard_config: null
      aws_model: null
      aws_region: null
      description: Track the number of tokens associated with the output from the LLM,
        and/or retrieved text from the vector database.
      google_model: null
      google_region: null
      is_agentic: false
      name: Response Tokens
      ootb_type: token_count
      openai_api_base: null
      openai_api_key: null
      openai_deployment_id: null
      stage: response
      type: ootb
  timeout_action: score
  timeout_sec: 60

general:
  front_end:
    _type: dragent_fastapi
    step_adaptor:
      mode: "off"

llms:
  datarobot_llm:
    _type: datarobot-llm-router
    primary:
      use_datarobot_llm_gateway: true
      llm_default_model: invalid-model-that-does-not-exist
    fallbacks:
      - use_datarobot_llm_gateway: true
        llm_default_model: azure/gpt-4o-2024-11-20
    num_retries: 1

middleware:
  datarobot_guardrails:
    _type: datarobot_moderation
    model_dir: "."

workflow:
  _type: crewai_agent
  llm_name: datarobot_llm
  description: CrewAI agent with router fallback
  middleware:
    - datarobot_guardrails
  max_iter: 20
  max_rpm: 30
  max_execution_time: 600
  allow_delegation: false
  max_retry_limit: 2
  reasoning: false
  max_reasoning_attempts: 1
