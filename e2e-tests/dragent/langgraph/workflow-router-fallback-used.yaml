general:
  front_end:
    _type: dragent_fastapi
    step_adaptor:
      mode: "off"

llms:
  datarobot_llm:
    _type: datarobot-llm-router
    primary:
      use_datarobot_llm_gateway: true
      llm_default_model: invalid-model-that-does-not-exist
    fallbacks:
      - use_datarobot_llm_gateway: true
        llm_default_model: azure/gpt-4o-2024-11-20
    num_retries: 1

middleware:
  datarobot_guardrails:
    _type: datarobot_moderation
    moderation:
      guards:
        - additional_guard_config: null
          aws_model: null
          aws_region: null
          description: Track the number of tokens associated with the input to the LLM, and/or
            retrieved text from the vector database.
          google_model: null
          google_region: null
          is_agentic: false
          name: Prompt Tokens
          ootb_type: token_count
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: prompt
          type: ootb
        - additional_guard_config: null
          aws_model: null
          aws_region: null
          description: Track the number of tokens associated with the output from the LLM,
            and/or retrieved text from the vector database.
          google_model: null
          google_region: null
          is_agentic: false
          name: Response Tokens
          ootb_type: token_count
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: response
          type: ootb
        - additional_guard_config: null
          aws_model: null
          aws_region: null
          description: Compare response text overlap with retrieved context using ROUGE-1.
          google_model: null
          google_region: null
          is_agentic: false
          name: Response ROUGE-1
          ootb_type: rouge_1
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: response
          type: ootb
        - additional_guard_config:
            cost:
              currency: USD
              input_price: 1.0
              input_unit: 1000
              output_price: 2.0
              output_unit: 1000
          aws_model: null
          aws_region: null
          description: Compute response-stage token cost from usage metrics.
          google_model: null
          google_region: null
          is_agentic: false
          name: Response Cost
          ootb_type: cost
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: response
          type: ootb
        - additional_guard_config:
            agent_guideline: >-
              The assistant must answer in plain language and must not refuse to discuss moderation
              token counting when the user asks about it.
          aws_model: null
          aws_region: null
          description: Judge whether the response follows the guideline (LLM gateway).
          google_model: null
          google_region: null
          is_agentic: false
          name: Guideline adherence (gateway)
          ootb_type: agent_guideline_adherence
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: response
          type: ootb
          llm_type: llmGateway
          llm_gateway_model_id: azure/gpt-4o-2024-11-20
        - additional_guard_config: null
          aws_model: null
          aws_region: null
          description: Faithfulness to retrieved citations (LLM gateway; needs RAG citations).
          google_model: null
          google_region: null
          is_agentic: false
          name: Faithfulness (gateway)
          ootb_type: faithfulness
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: response
          type: ootb
          llm_type: llmGateway
          llm_gateway_model_id: azure/gpt-4o-2024-11-20
        - additional_guard_config: null
          aws_model: null
          aws_region: null
          description: Adherence to the requested task.
          google_model: null
          google_region: null
          is_agentic: false
          name: Task Adherence (gateway)
          ootb_type: task_adherence
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: response
          type: ootb
          llm_type: llmGateway
          llm_gateway_model_id: azure/gpt-4o-2024-11-20
        - additional_guard_config: null
          aws_model: null
          aws_region: null
          description: Goal accuracy
          google_model: null
          google_region: null
          is_agentic: false
          name: Goal Accuracy (gateway)
          ootb_type: agent_goal_accuracy
          openai_api_base: null
          openai_api_key: null
          openai_deployment_id: null
          stage: response
          type: ootb
          llm_type: llmGateway
          llm_gateway_model_id: azure/gpt-4o-2024-11-20
      timeout_action: score
      timeout_sec: 180


workflow:
  _type: langgraph_agent
  llm_name: datarobot_llm
  description: LangGraph agent with router fallback
  verbose: true
  middleware:
    - datarobot_guardrails
