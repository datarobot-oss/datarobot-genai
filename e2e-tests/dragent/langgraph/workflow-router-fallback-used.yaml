general:
  front_end:
    _type: dragent_fastapi
    step_adaptor:
      mode: "off"

llms:
  datarobot_llm:
    _type: datarobot-llm-router
    primary:
      use_datarobot_llm_gateway: true
      llm_default_model: invalid-model-that-does-not-exist
    fallbacks:
      - use_datarobot_llm_gateway: true
        llm_default_model: azure/gpt-4o-2024-11-20
    num_retries: 1

middleware:
  datarobot_guardrails:
    _type: datarobot_moderation
    moderation:
      guards:
        - name: Prompt Tokens
          description: Track the number of tokens associated with the input to the LLM, and/or
            retrieved text from the vector database.
          is_agentic: false
          ootb_type: token_count
          stage: prompt
          type: ootb
        - name: Response Tokens
          description: Track the number of tokens associated with the output from the LLM,
            and/or retrieved text from the vector database.
          is_agentic: false
          ootb_type: token_count
          stage: response
          type: ootb
      timeout_action: score
      timeout_sec: 60


workflow:
  _type: langgraph_agent
  llm_name: datarobot_llm
  description: LangGraph agent with router fallback
  verbose: true
  middleware:
    - datarobot_guardrails
