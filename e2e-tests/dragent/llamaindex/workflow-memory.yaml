# E2E overlay: LlamaIndex agent wrapped with streaming_memory_agent and dr_mem0_memory.
# AGENT_MEMORY_SPACE_ID must be set in the environment (see pr-tests.yaml dr-memory-service).
base: workflow.yaml

memory:
  mem0_memory:
    _type: dr_mem0_memory

functions:
  chat_agent:
    _type: llamaindex_agent
    llm_name: datarobot_llm
    description: E2E agent with DataRobot Memory Service.
    middleware:
      - datarobot_guardrails
      - datarobot_otel_conventions
    verbose: true
    allow_parallel_tool_calls: true

workflow:
  _type: streaming_memory_agent
  llm_name: datarobot_llm
  description: "E2E agent with DataRobot Memory Service."
  inner_agent_name: chat_agent
  memory_name: mem0_memory
  save_ai_messages_to_memory: false
  search_params:
    top_k: 5
  add_params:
    async_mode: false
