# Minimal NAT eval config for e2e tests (``nat eval --skip_workflow``).
functions:
  judge:
    _type: chat_completion
    llm_name: datarobot_llm
    description: Judge LLM for DataRobot moderation evaluators.

llms:
  datarobot_llm:
    _type: datarobot-llm-component
    temperature: 0

workflow:
  _type: chat_completion
  llm_name: datarobot_llm
  description: Minimal workflow placeholder for nat eval e2e.

eval:
  general:
    max_concurrency: 1
    output:
      # Default for manual ``nat eval`` runs; e2e overrides via --override to pytest tmp_path.
      dir: ./.tmp/nat-eval-e2e
      cleanup: true
    dataset:
      _type: json
      file_path: ./eval/dataset.json
  evaluators:
    faithfulness:
      _type: faithfulness
      llm_name: datarobot_llm
