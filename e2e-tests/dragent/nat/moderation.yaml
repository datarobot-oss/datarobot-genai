# Guard config consumed by the `moderations` nat evaluator via ModerationPipeline.from_yaml.
# agent_goal_accuracy is an LLM-as-judge, trajectory-aware guard: set deployment_id to a
# DataRobot LLM deployment to act as the judge (distinct from the agent's own LLM).
timeout_sec: 120
guards:
  - name: Agent Goal Accuracy
    type: ootb
    ootb_type: agent_goal_accuracy
    stage: response
    is_agentic: true
    llm_type: llmGateway
    llm_gateway_model_id: "azure/gpt-4o-2024-11-20"
    intervention:
      action: report
      conditions: []
