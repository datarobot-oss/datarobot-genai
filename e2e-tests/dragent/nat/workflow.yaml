general:
  front_end:
    _type: dragent_fastapi
    a2a:
      server:
        name: "E2E NAT Agent"
        description: "NAT agent for end-to-end testing."
  telemetry:
    tracing:
      otelcollector:
        _type: datarobot_otelcollector
        project: "nat"

functions:
  planner:
    _type: chat_completion
    llm_name: datarobot_llm
    system_prompt: "Call any required tool. Reply with only the tool's result, or 1 brief line if no tool is needed."
    description: A tool that plans the content for the requested topic.
  writer:
    _type: chat_completion
    llm_name: datarobot_llm
    system_prompt: "Reply with only the tool's result, or 1 brief line."
    description: A tool that writes the content for the requested topic.
  generate_objectid:
    _type: generate_objectid
    description: A tool that generates an object ID for a deployment.

llms:
  datarobot_llm:
    _type: datarobot-llm-component
    temperature: 0

function_groups:
  mcp_tools:
    _type: datarobot_mcp_client

authentication:
  datarobot_mcp_auth:
    _type: datarobot_mcp_auth

middleware:
  datarobot_guardrails:
    _type: datarobot_moderation
    moderation:
      guards:
        - name: Prompt Tokens
          description: Track the number of tokens associated with the input to the LLM, and/or
            retrieved text from the vector database.
          ootb_type: token_count
          stage: prompt
          type: ootb
        - name: Response Tokens
          description: Track the number of tokens associated with the output from the LLM,
            and/or retrieved text from the vector database.
          ootb_type: token_count
          stage: response
          type: ootb
      timeout_sec: 60


workflow:
  _type: per_user_tool_calling_agent
  llm_name: datarobot_llm
  middleware:
    - datarobot_guardrails
  tool_names:
    - planner
    - writer
    - mcp_tools
    - generate_objectid
  return_direct:
    - writer
  system_prompt: |
    Call planner, then writer. Return writer's output.
    If asked to generate an object ID, call generate_objectid and return its exact result.
  verbose: true
