general:
  front_end:
    _type: dragent_fastapi
    a2a:
      server:
        name: "E2E NAT Agent"
        description: "NAT agent for end-to-end testing."
  telemetry:
    tracing:
      otelcollector:
        _type: datarobot_otelcollector
        project: "nat"
        # Export every NAT span immediately (default is 100) so a request's
        # spans drain before the next e2e test resets the shared mock collector.
        batch_size: 1

functions:
  planner:
    _type: chat_completion
    llm_name: datarobot_llm
    system_prompt: "Call any required tool. Reply with only the tool's result, or 1 brief line if no tool is needed."
    description: A tool that plans the content for the requested topic.
  writer:
    _type: chat_completion
    llm_name: datarobot_llm
    system_prompt: "Reply with only the tool's result, or 1 brief line."
    description: A tool that writes the content for the requested topic.
  generate_objectid:
    _type: generate_objectid
    description: A tool that generates an object ID for a deployment.
  nat_agent:
    _type: per_user_tool_calling_agent
    llm_name: datarobot_llm
    # Normalization is innermost so it converts the agent's native ChatResponseChunk / str
    # output into DRAgentEventResponse before the outer streaming_memory_agent middleware runs.
    middleware:
      - datarobot_dragent_normalization
    tool_names:
      - planner
      - writer
      - mcp_tools
      - generate_objectid
    system_prompt: |
      Call planner, then writer. Return writer's output.
      If asked to generate an object ID, call generate_objectid and return its exact result.
    verbose: true

llms:
  datarobot_llm:
    _type: datarobot-llm-component
    temperature: 0

function_groups:
  mcp_tools:
    _type: datarobot_mcp_client

authentication:
  datarobot_mcp_auth:
    _type: datarobot_mcp_auth

middleware:
  datarobot_guardrails:
    _type: datarobot_moderation
    moderation:
      guards:
        - name: Prompt Tokens
          description: Track the number of tokens associated with the input to the LLM, and/or
            retrieved text from the vector database.
          ootb_type: token_count
          stage: prompt
          type: ootb
        - name: Response Tokens
          description: Track the number of tokens associated with the output from the LLM,
            and/or retrieved text from the vector database.
          ootb_type: token_count
          stage: response
          type: ootb
      timeout_sec: 60
  datarobot_otel_conventions:
    _type: datarobot_otel_conventions
  datarobot_dragent_normalization:
    _type: datarobot_dragent_normalization


memory:
  mem0_memory:
    _type: dr_mem0_memory

workflow:
  # When memory is not configured streaming_memory_agent is a passthrough so it is safe to use
  # unconditionally.
  _type: streaming_memory_agent
  inner_agent_name: nat_agent
  memory_name: mem0_memory
  llm_name: datarobot_llm
  description: NAT agent with automatic memory capture and retrieval
  middleware:
    - datarobot_guardrails
    - datarobot_otel_conventions
  save_ai_messages_to_memory: false
  search_params:
    top_k: 5
  add_params:
    async_mode: false
