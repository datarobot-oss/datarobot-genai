functions:
  planner:
    _type: chat_completion
    llm_name: datarobot_llm
    system_prompt: |
      You are a content planner. Given a topic, produce a short bullet-point
      outline with 3-5 key points. No paragraphs, no explanations — just the list.
    description: A tool that plans the content for the requested topic.
  writer:
    _type: chat_completion
    llm_name: datarobot_llm
    system_prompt: |
      You are a concise writer. Using the planner's outline, write a short
      response in 2-3 sentences.
    description: A tool that writes the content for the requested topic.
  content_writer_pipeline:
    _type: sequential_executor
    tool_list: [planner, writer]
    description: A tool that plans and writes content on the requested topic.
llms:
  datarobot_llm:
    _type: datarobot-llm-component

function_groups:
  mcp_tools:
    _type: datarobot_mcp_client

authentication:
  datarobot_mcp_auth:
    _type: datarobot_mcp_auth

workflow:
  _type: tool_calling_agent
  llm_name: datarobot_llm
  tool_names:
    - content_writer_pipeline
  return_direct:
    - content_writer_pipeline
  system_prompt: Choose and call a tool to answer the query.
