# E2E overlay: gateway extended thinking via workflow ``extra_body`` (see docs/nat/llm.md).
base: workflow.yaml

llms:
  datarobot_llm:
    _type: datarobot-llm-component
    temperature: ~
    extra_body:
      thinking:
        type: enabled
        budget_tokens: 1024

middleware:
  datarobot_guardrails:
    _type: datarobot_moderation
    moderation:
      guards:
        - name: Stay on topic for input
          type: nemo_guardrails
          stage: prompt
          llm_type: llmGateway
          llm_gateway_model_id: vertex_ai/gemini-3.1-pro-preview
          intervention:
            action: block
            message: "This topic is outside the allowed scope."
            conditions:
              - comparand: "TRUE"
                comparator: equals
        - name: Stay on topic for output
          type: nemo_guardrails
          stage: response
          llm_type: llmGateway
          llm_gateway_model_id: vertex_ai/gemini-3.1-pro-preview
          intervention:
            action: block
            message: "This topic is outside the allowed scope."
            conditions:
              - comparand: "TRUE"
                comparator: equals
      timeout_sec: 60
