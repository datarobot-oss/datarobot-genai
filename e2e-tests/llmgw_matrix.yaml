agent:
  - langgraph
  - crewai
  - llamaindex
  - nat
  - base
python-version:
  - "3.12"
model:
  - label: default
    id: "datarobot/bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0"
    all_tests: true
    additional_model_params: '{"thinking": {"type": "enabled", "budget_tokens": 2048}}'
  - label: gpt
    id: "datarobot/azure/gpt-5-1-2025-11-13"
    all_tests: false
  - label: sonnet
    id: "datarobot/anthropic/claude-sonnet-4-5-20250929"
    all_tests: false
  - label: gemini
    id: "datarobot/vertex_ai/gemini-3.1-pro-preview"
    all_tests: false
# base is not model dependent
exclude:
  - agent: base
    model:
      label: sonnet
  - agent: base
    model:
      label: gemini
  - agent: nat
    model:
      label: gpt
