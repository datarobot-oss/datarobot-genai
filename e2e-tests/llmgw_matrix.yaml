agent:
  - langgraph
  - crewai
  - llamaindex
  - nat
  - base
python-version:
  - "3.12"
model:
  - label: default
    id: "datarobot/bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0"
    all_tests: true
    reasoning_tests: true
    workflow_file: workflow-reasoning.yaml
  - label: gpt
    id: "datarobot/azure/gpt-5-2-2025-12-11"
    workflow_file: workflow.yaml
  - label: sonnet
    id: "datarobot/anthropic/claude-sonnet-4-5-20250929"
    workflow_file: workflow.yaml
  - label: gemini
    id: "datarobot/vertex_ai/gemini-3.1-pro-preview"
    workflow_file: workflow.yaml
# base is not model dependent
exclude:
  - agent: base
    model:
      label: sonnet
  - agent: base
    model:
      label: gemini
  - agent: nat
    model:
      label: gpt
