---
guards:
  - name: Prompt Tokens
    description: Track the number of tokens associated with the input to the LLM, and/or
      retrieved text from the vector database.
    is_agentic: false
    ootb_type: token_count
    stage: prompt
    type: ootb
  - name: Response Tokens
    description: Track the number of tokens associated with the output from the LLM,
      and/or retrieved text from the vector database.
    is_agentic: false
    ootb_type: token_count
    stage: response
    type: ootb
  - name: Response ROUGE-1
    description: Compare response text overlap with retrieved context using ROUGE-1.
    is_agentic: false
    ootb_type: rouge_1
    stage: response
    type: ootb
  - name: Response Cost
    description: Compute response-stage token cost from usage metrics.
    is_agentic: false
    ootb_type: cost
    stage: response
    type: ootb
    additional_guard_config:
      cost:
        currency: USD
        input_price: 1.0
        input_unit: 1000
        output_price: 2.0
        output_unit: 1000
timeout_action: score
timeout_sec: 60
