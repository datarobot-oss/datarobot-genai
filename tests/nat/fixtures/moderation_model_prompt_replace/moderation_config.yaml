---
# Model guard (Regression) on prompt: when ``trigger_pred`` > 0.5, replace with ``replacement_col``
# from deployment predictions. Tests patch ``datarobot.Deployment.get`` and
# ``AsyncHTTPClient.predict`` so the real ``run_guards`` / ``ModelGuard`` path runs without HTTP.
timeout_action: score
timeout_sec: 180
guards:
  - name: Prompt replace model
    description: Mock deployment returns a replacement string for the user prompt.
    type: model
    stage: prompt
    deployment_id: "507f191e810c19729de860ea"
    is_agentic: false
    model_info:
      input_column_name: promptText
      target_name: trigger_pred
      target_type: Regression
      replacement_text_column_name: replacement_col
    intervention:
      action: replace
      conditions:
        - comparand: 0.5
          comparator: greaterThan
