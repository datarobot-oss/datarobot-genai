---
# Prescore-only: block when prompt token count exceeds the threshold (tiktoken cl100k_base).
# Used by ``test_function_middleware_*_prompt_token_limit_blocks`` in
# ``tests/nat/test_datarobot_moderation_middleware.py``.
timeout_action: score
timeout_sec: 180
guards:
  - name: Prompt token cap
    description: Block prompts whose token count is greater than the configured maximum.
    type: ootb
    ootb_type: token_count
    stage: prompt
    is_agentic: false
    intervention:
      action: block
      message: Prompt exceeds the configured maximum length (token count).
      conditions:
        - comparand: 32
          comparator: greaterThan
