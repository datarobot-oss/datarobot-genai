---
# Postscore-only: block when assistant response token count exceeds the threshold
# (tiktoken cl100k_base). Used by ``*_response_token_limit_blocks`` in
# ``tests/nat/test_datarobot_moderation_middleware.py``.
timeout_sec: 180
guards:
  - name: Response token cap
    description: Block responses whose token count is greater than the configured maximum.
    type: ootb
    ootb_type: token_count
    stage: response
    intervention:
      action: block
      message: Response exceeds the configured maximum length (token count).
      conditions:
        - comparand: 32
          comparator: greaterThan
