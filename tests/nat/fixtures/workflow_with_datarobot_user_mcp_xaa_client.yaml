authentication:
  okta_auth:
    _type: okta_cross_app_access

function_groups:
  mcp:
    _type: mcp_client_with_xaa_support
    forward_inbound_headers: true
    server:
      transport: streamable-http
      url: "https://fool/bar/mcp"
      auth_provider: okta_auth
    cross_application_access:
      token_exchange:
        trusted_issuer: "https://foo/bar"
        audience: "https://foo/bar"
      token_request:
        token_url: "https://foo/bar"
        audience: "https://foo/bar"
        scopes:
          - "dr.impersonation"